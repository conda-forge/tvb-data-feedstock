{% set name = "tvb-data" %}
{% set version = "3.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  md5: de4f7b07e4406e86b31877d39f336518
  sha256: 3a111a297d848f3d802bf7229601eb276c6776b24d360b378ac1089332e69e64
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/t/tvb-data/{{ name | replace('-', '_') }}-{{ version }}.tar.gz

build:
  number: 0
  script: python setup.py install --single-version-externally-managed --record record.txt

requirements:
  host:
    - python
    - setuptools
  run:
    - python

test:
  imports:
    - tvb_data

about:
  home: http://www.thevirtualbrain.com/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: 'A package with data for TVB'
  description: |
    Various demonstration datasets for use with The Virtual Brain are provided here.
  doc_url: http://docs.thevirtualbrain.org/
  dev_url: https://github.com/the-virtual-brain/tvb-data

extra:
  recipe-maintainers:
    - liadomide
